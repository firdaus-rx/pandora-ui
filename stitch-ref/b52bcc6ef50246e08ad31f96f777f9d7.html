<style>
        body {
            background-color: #051424;
            overflow: hidden;
        }
        .glass-card {
            background: rgba(18, 33, 49, 0.5);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .bg-animate {
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #051424 100%);
        }
        .text-gradient {
            background: linear-gradient(135deg, #d2bbff 0%, #adc6ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .button-gradient {
            background: linear-gradient(135deg, #7c3aed 0%, #0566d9 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .button-gradient:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.4);
        }
        .input-glow:focus {
            box-shadow: 0 0 0 2px rgba(210, 187, 255, 0.1);
            border-color: #d2bbff;
        }

            background-color: #7c3aed;
            border-color: #7c3aed;

<body class="bg-animate min-h-screen flex items-center justify-center p-gutter">
<!-- Atmospheric Background Elements -->
<div class="fixed inset-0 pointer-events-none overflow-hidden">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-secondary-container/10 blur-[120px] rounded-full"></div>
</div>
<!-- Login Container -->
<main class="w-full max-w-[440px] z-10">
<div class="glass-card rounded-xl p-stack-lg flex flex-col gap-stack-lg">
<!-- Logo Section -->
<div class="flex flex-col items-center gap-stack-sm text-center">
<div class="w-16 h-16 rounded-xl bg-surface-container-highest flex items-center justify-center mb-stack-sm border border-outline-variant/20">
<span class="material-symbols-outlined text-[40px] text-gradient" style="font-variation-settings: 'FILL' 1;">
                        smart_toy
                    </span>
</div>
<h1 class="font-display-lg text-display-lg text-gradient tracking-tight">MediaAI</h1>
<p class="font-body-md text-body-md text-on-surface-variant">The power of AI, in your pocket.</p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-stack-md" onsubmit="return false;">
<!-- Username Field -->
<div class="flex flex-col gap-stack-xs">
<label class="font-label-caps text-label-caps text-outline ml-1 uppercase" for="username">Username</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">person</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-lg py-3 pl-12 pr-4 font-body-md text-on-surface placeholder:text-outline/50 outline-none transition-all input-glow" id="username" placeholder="Enter your username" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-stack-xs">
<label class="font-label-caps text-label-caps text-outline ml-1 uppercase" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-lg py-3 pl-12 pr-12 font-body-md text-on-surface placeholder:text-outline/50 outline-none transition-all input-glow" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="password-toggle-icon">visibility</span>
</button>
</div>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between mt-1">
<label class="flex items-center gap-2 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer h-5 w-5 appearance-none border border-outline-variant/50 rounded bg-surface-container-lowest checked:bg-primary-container checked:border-primary-container transition-all cursor-pointer" id="remember" type="checkbox"/>
<span class="material-symbols-outlined absolute opacity-0 peer-checked:opacity-100 text-on-primary-container text-[16px] left-1/2 -translate-x-1/2 pointer-events-none">check</span>
</div>
<span class="font-body-sm text-body-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember Me</span>
</label>
<a class="font-body-sm text-body-sm text-primary hover:underline transition-all" href="#">Forgot password?</a>
</div>
<!-- Action Button -->
<button class="button-gradient w-full py-4 rounded-lg font-title-md text-title-md text-white font-bold flex items-center justify-center gap-2 group mt-stack-sm" type="submit">
                    Login
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Footer Section -->
<div class="flex flex-col gap-stack-md mt-stack-sm">
<div class="flex items-center gap-4">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="font-label-caps text-label-caps text-outline uppercase">Or continue with</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<div class="grid grid-cols-2 gap-stack-md">
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-lg border border-outline-variant/30 bg-surface-variant/20 hover:bg-surface-variant/40 transition-all font-body-sm text-body-sm text-on-surface">
<svg class="w-5 h-5" viewbox="0 0 24 24">

<path d="M12.18 20.45c2.29 0 4.22-.76 5.63-2.06l-3.24-2.48c-.9.6-2.05.96-3.39.96c-2.61 0-4.81-1.76-5.6-4.12H2.26v2.57c1.39 2.76 4.27 4.65 7.64 4.65l2.28.48Z" fill="currentColor"></path>
<path d="M6.58 12.75a5.95 5.95 0 0 1 0-3.5v-2.57H2.26a9.98 9.98 0 0 0 0 8.64l4.32-2.57Z" fill="currentColor"></path>
<path d="M12.18 6.05c1.25 0 2.37.43 3.25 1.27l2.43-2.43C16.39 3.52 14.46 3 12.18 3c-3.37 0-6.25 1.89-7.64 4.65l4.32 2.57c.79-2.36 2.99-4.12 5.6-4.12Z" fill="currentColor"></path>
</svg>
                        Google
                    </button>
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-lg border border-outline-variant/30 bg-surface-variant/20 hover:bg-surface-variant/40 transition-all font-body-sm text-body-sm text-on-surface">
<span class="material-symbols-outlined text-[20px]">brand_awareness</span>
                        Github
                    </button>
</div>
<p class="text-center font-body-sm text-body-sm text-on-surface-variant mt-stack-sm">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline" href="#">Sign up for free</a>
</p>
</div>
</div>
<!-- System Status Bar -->
<div class="flex justify-center gap-stack-lg mt-stack-lg">
<div class="flex items-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
<span class="font-label-caps text-label-caps text-outline uppercase">API Online</span>
</div>
<div class="flex items-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
<span class="font-label-caps text-label-caps text-outline uppercase">Media Cluster Active</span>
</div>
</div>
</main>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('password-toggle-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.innerText = 'visibility';
            }
        }

        // Lightweight hover effect for background
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('.glass-card');
            if (!card) return;
            
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // Subtly shift glow based on mouse position relative to card
            const intensity = 0.05;
            card.style.borderColor = `rgba(210, 187, 255, ${intensity})`;
        });
    </script>
</body></html>
